<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Debt Payoff Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">
    <div class="max-w-2xl mx-auto px-6 py-12">
        <a href="index.html" class="inline-flex items-center text-sm text-blue-600 hover:underline mb-8">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Calculator
        </a>

        <h1 class="text-4xl font-semibold tracking-tight mb-4">Contact Us</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-8">Have feedback, questions, or suggestions? We'd love to hear from you.</p>

        <div class="bg-white dark:bg-gray-900 rounded-3xl p-8 border border-gray-200 dark:border-gray-700">
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Your Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-2xl border border-gray-300 dark:border-gray-700 dark:bg-gray-800">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-2xl border border-gray-300 dark:border-gray-700 dark:bg-gray-800">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Message</label>
                    <textarea name="message" rows="6" required class="w-full px-4 py-3 rounded-2xl border border-gray-300 dark:border-gray-700 dark:bg-gray-800"></textarea>
                </div>
                <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-medium transition-colors">
                    Send Message
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-8">We usually reply within 1–2 business days.</p>
    </div>
</body>
</html>
